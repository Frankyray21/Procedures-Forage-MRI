# Configuration Wrangler — Worker « Attestations procédures (web) »
# Déploiement CLI (optionnel) depuis ce dossier :
#     cd worker && npx wrangler deploy
# Le secret AIRTABLE_TOKEN se règle dans le tableau de bord Cloudflare
# (Settings → Variables and Secrets), pas ici.
#
# ⚠️ Ce fichier est dans worker/ (et non à la racine) pour ne pas interférer
# avec le projet Cloudflare Pages qui sert le SITE depuis la racine du dépôt.
# Le Worker est CONNECTÉ AU DÉPÔT GITHUB (Cloudflare → Settings → Build,
# root directory = worker) : chaque push sur main le redéploie automatiquement
# — plus besoin de copier-coller worker.js dans le tableau de bord.

name = "attestations-procedures"
main = "worker.js"
compatibility_date = "2025-09-01"
