<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Édition des procédures — MRI</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="styles.css">
<style>
  .adminbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
    padding:.7rem clamp(1rem,4vw,2rem);background:rgba(10,14,23,.9);backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(255,255,255,.07)}
  .adminbar b{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.03em;font-size:1.05rem}
  .adminbar .sp{margin-left:auto}
  .adminbar a.home{color:var(--muted);font-weight:700;font-size:.9rem}
  .adminbar a.home:hover{color:#fff}
  .adminwrap{display:grid;grid-template-columns:310px 1fr;gap:1.4rem;max-width:1280px;margin:0 auto;
    padding:1.3rem clamp(1rem,4vw,2rem) 5rem;align-items:start}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem}
  .side{position:sticky;top:70px;display:flex;flex-direction:column;gap:.7rem;max-height:calc(100vh - 90px);overflow:auto}
  .side input.f{margin:0}
  .plist{display:flex;flex-direction:column;gap:.25rem;overflow:auto}
  .plist button{text-align:left;background:transparent;border:1px solid transparent;border-radius:9px;padding:.5rem .6rem;
    color:var(--muted);font-weight:600;font-size:.86rem;cursor:pointer;transition:.15s;display:flex;gap:.45rem;align-items:center}
  .plist button:hover{background:rgba(255,255,255,.05);color:#fff}
  .plist button.on{background:rgba(210,35,37,.14);color:#fff;border-color:rgba(210,35,37,.4)}
  .plist .pc{font-size:.68rem;color:var(--dim);font-family:var(--font-display)}
  .divider{height:1px;background:var(--border);margin:.3rem 0}
  label.fl{display:block;font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);
    font-weight:700;margin:.9rem 0 .3rem}
  .f{width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:9px;color:var(--text);
    padding:.55rem .7rem;font-family:inherit;font-size:.92rem}
  textarea.f{min-height:64px;resize:vertical;line-height:1.5}
  .f:focus{border-color:var(--brand);outline:none}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
  .hint{font-size:.74rem;color:var(--dim);margin-top:.2rem}
  .rep{display:flex;flex-direction:column;gap:.5rem}
  .reprow{display:flex;gap:.5rem;align-items:flex-start;background:var(--bg-2);border:1px solid var(--border);
    border-radius:10px;padding:.55rem}
  .reprow .gr{flex:1;display:grid;gap:.4rem}
  .reprow .num{width:54px;flex:none}
  .reprow .del{flex:none;background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.3);color:#fca5a5;
    border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:1.1rem;line-height:1}
  .addbtn{align-self:flex-start;background:var(--card-2);border:1px dashed var(--border);color:var(--muted);
    border-radius:9px;padding:.45rem .8rem;font-weight:700;font-size:.84rem;cursor:pointer}
  .addbtn:hover{border-color:var(--brand);color:#fff}
  .formhead{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;margin-bottom:.4rem}
  .formhead h2{font-family:var(--font-display);text-transform:uppercase;font-size:1.4rem}
  .actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1.4rem;position:sticky;bottom:0;
    background:linear-gradient(180deg,transparent,var(--card) 40%);padding-top:1rem}
  .muted{color:var(--dim);font-size:.82rem}
  .empty2{color:var(--dim);text-align:center;padding:3rem 1rem}
  @media(max-width:820px){.adminwrap{grid-template-columns:1fr}.side{position:static;max-height:none}}
</style>
</head>
<body>

<header class="adminbar" id="bar">
  <b>Édition des procédures</b>
  <span class="muted">Modifications locales — pensez à exporter <code>data.js</code></span>
  <span class="sp"></span>
  <a class="home" href="index.html">↩ Retour au site</a>
</header>

<main class="adminwrap" id="wrap">
  <aside class="panel side">
    <button class="btn" id="newProc" style="width:100%">＋ Nouvelle procédure</button>
    <input class="f" id="filter" placeholder="Filtrer…">
    <div class="plist" id="plist"></div>
    <div class="divider"></div>
    <button class="btn ghost" id="editCode" style="width:100%">Éditer le Code de sécurité</button>
    <div class="divider"></div>
    <button class="btn" id="exportBtn" style="width:100%">⬇ Exporter data.js</button>
    <button class="btn ghost" id="copyBtn" style="width:100%">Copier le JSON</button>
    <p class="hint">L'export télécharge un <b>data.js</b> à placer dans le dossier du site (puis commit Git).</p>
  </aside>
  <section class="panel" id="formArea"><div class="empty2">Sélectionnez une procédure à gauche, ou créez-en une nouvelle.</div></section>
</main>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="admin.js"></script>
</body>
</html>
